<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBootcamp | Brutal Finance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style id="main-styles">
        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --accent: #00ff88;
            --text: #ffffff;
            --text-dim: #888;
            --border: #222;
            --gold: #ffcc00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; vertical-align: middle; margin-left: 10px; }
        .status { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 0.7rem; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 50px; }

        .controls-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 12px;
        }

        h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.5rem; }
        .input-group input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .metric-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .metric-card.gold { border-color: var(--gold); }
        .metric-card label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem; }
        .metric-card .value { font-size: 2.5rem; font-weight: 900; font-family: 'JetBrains Mono', monospace; }

        .projection-table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        th { text-align: left; padding: 1.5rem; border-bottom: 1px solid var(--border); color: var(--text-dim); text-transform: uppercase; }
        td { padding: 1.5rem; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        
        .highlight { color: var(--accent); }
        .warning { color: var(--gold); }

        @media (max-width: 900px) {
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">AIBootcamp <span>FINANCE</span></div>
            <div class="status">LIVE TRACKING ACTIVE</div>
        </header>

        <main>
            <!-- Part 1: Input Controls -->
            <section class="controls-grid">
                <div class="card input-card">
                    <h3>Campaign Settings</h3>
                    <div class="input-group">
                        <label>Enrollment Price (PKR)</label>
                        <input type="number" id="price" value="1999" step="100">
                    </div>
                    <div class="input-group">
                        <label>Total Enrolled</label>
                        <input type="number" id="enrolled" value="17" step="1">
                    </div>
                    <div class="input-group">
                        <label>Total Ad Spend (PKR)</label>
                        <input type="number" id="spend" value="5000" step="500">
                    </div>
                </div>

                <!-- Part 2: Primary Metrics -->
                <div class="metrics-grid">
                    <div class="metric-card gold">
                        <label>Gross Revenue</label>
                        <div class="value" id="revenue">PKR 0</div>
                    </div>
                    <div class="metric-card">
                        <label>Net Profit</label>
                        <div class="value" id="profit">PKR 0</div>
                    </div>
                    <div class="metric-card">
                        <label>ROAS</label>
                        <div class="value" id="roas">0.0x</div>
                    </div>
                    <div class="metric-card">
                        <label>CPA (Cost/Lead)</label>
                        <div class="value" id="cpa">PKR 0</div>
                    </div>
                </div>
            </section>

            <!-- Part 3: Projections -->
            <section class="projections">
                <h3>Scaling Projections</h3>
                <div class="projection-table-wrap">
                    <table id="projection-table">
                        <thead>
                            <tr>
                                <th>Target Students</th>
                                <th>Unit Price</th>
                                <th>Gross Rev</th>
                                <th>Est. Ad Spend</th>
                                <th>Est. Profit</th>
                            </tr>
                        </thead>
                        <tbody id="projection-body">
                            <!-- JS injected -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script id="logic-script">
        const priceInput = document.getElementById('price');
        const enrolledInput = document.getElementById('enrolled');
        const spendInput = document.getElementById('spend');

        const revenueDisplay = document.getElementById('revenue');
        const profitDisplay = document.getElementById('profit');
        const roasDisplay = document.getElementById('roas');
        const cpaDisplay = document.getElementById('cpa');
        const projectionBody = document.getElementById('projection-body');

        function formatPKR(val) {
            return 'PKR ' + Math.floor(val).toLocaleString();
        }

        function calculate() {
            const price = parseFloat(priceInput.value) || 0;
            const enrolled = parseFloat(enrolledInput.value) || 0;
            const spend = parseFloat(spendInput.value) || 0;

            const revenue = price * enrolled;
            const profit = revenue - spend;
            const roas = spend > 0 ? (revenue / spend).toFixed(1) : '0.0';
            const cpa = enrolled > 0 ? (spend / enrolled) : 0;

            revenueDisplay.textContent = formatPKR(revenue);
            profitDisplay.textContent = formatPKR(profit);
            roasDisplay.textContent = roas + 'x';
            cpaDisplay.textContent = formatPKR(cpa);

            // Update Projections
            const targets = [50, 100, 250, 500, 1000];
            let html = '';
            
            targets.forEach(target => {
                // Projection logic: if target > 50, use the 9000 PKR price point
                const unitPrice = target <= 50 ? 1999 : 9000;
                const gross = target * unitPrice;
                // Assuming scaling ads becomes slightly more expensive (est. CPA increases slightly)
                const estCPA = cpa > 0 ? cpa * (1 + (target / 2000)) : 500; 
                const estSpend = target * estCPA;
                const estProfit = gross - estSpend;

                html += `
                    <tr>
                        <td>${target} Students</td>
                        <td>${formatPKR(unitPrice)}</td>
                        <td class="highlight">${formatPKR(gross)}</td>
                        <td>${formatPKR(estSpend)}</td>
                        <td class="${estProfit > 0 ? 'highlight' : 'warning'}">${formatPKR(estProfit)}</td>
                    </tr>
                `;
            });
            projectionBody.innerHTML = html;
        }

        [priceInput, enrolledInput, spendInput].forEach(el => el.addEventListener('input', calculate));
        calculate(); // Initial run
    </script>
</body>
</html>
